project:
  name: air_quality_stability
  random_seed: 42

data:
  raw_path: data/raw/
  processed_path: data/processed/
  target_column: pm25

preprocessing:
  test_size: 0.2
  normalize: true
  remove_outliers: true

model:
  name: xgboost
  params:
    n_estimators: 200
    max_depth: 6
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8

training:
  cross_validation: true
  cv_folds: 5
  metric: rmse

outputs:
  model_path: outputs/models/
  figures_path: outputs/figures/
  logs_path: outputs/logs/